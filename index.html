<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Enhancement Results</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #f8f9fa;
            color: #333;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        h2 {
            font-size: 1.5em;
            margin-top: 42px;
            margin-bottom: 20px;
            color: #34495e;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: 1550px;
        }

        th, td {
            padding: 12px 8px;
            vertical-align: middle;
            border-bottom: 1px solid #eee;
        }

        th {
            font-weight: 600;
            font-size: 1.02em;
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        .condition-col {
            font-weight: bold;
            text-align: left;
            white-space: nowrap;
            color: #555;
            font-size: 0.9em;
            min-width: 270px;
        }

        .file-name {
            font-size: 0.8em;
            color: #888;
            font-weight: normal;
            display: block;
            margin-top: 4px;
            max-width: 340px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        audio {
            width: 140px;
            height: 36px;
            outline: none;
        }

        .table-wrapper::-webkit-scrollbar {
            height: 8px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        @media (max-width: 900px) {
            body {
                padding: 20px 8px;
            }

            .container {
                padding: 18px;
            }

            h1 {
                font-size: 1.5em;
            }

            h2 {
                font-size: 1.25em;
            }

            audio {
                width: 125px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Speech Enhancement Results Comparison</h1>

    <div id="demo-content"></div>
</div>

<script>
    const modelColumns = [
        { label: "Clean", folder: "clean" },
        { label: "Noisy", folder: "noisy" },
        { label: "LGDK-Net", folder: "LGDK-Net" },
        { label: "CMGAN", folder: "CMGAN" },
        { label: "MP-SENet", folder: "MP-SENet" },
        { label: "SEMamba", folder: "SEMamba" },
        { label: "Mamba-SEUNet", folder: "Mamba-SEUNet" },
        { label: "PrimeK-Net", folder: "PrimeK-Net" }
    ];

    const datasets = [
        {
            title: "DNS-Challenge: -10 dB",
            basePath: "./demo/DNS-10dB",
            rows: [
                {
                    condition: "-10 dB",
                    displayName: "11.wav",
                    fileName: "11.wav"
                },
                {
                    condition: "-10 dB",
                    displayName: "95.wav",
                    fileName: "95.wav"
                },
                {
                    condition: "-10 dB",
                    displayName: "76.wav",
                    fileName: "76.wav"
                },
                {
                    condition: "-10 dB",
                    displayName: "84.wav",
                    fileName: "84.wav"
                }
            ]
        },

        {
            title: "DNS-Challenge: -15 dB",
            basePath: "./demo/DNS-15dB",
            rows: [
                {
                    condition: "-15 dB",
                    displayName: "11.wav",
                    fileName: "11.wav"
                },
                {
                    condition: "-15 dB",
                    displayName: "145.wav",
                    fileName: "145.wav"
                },
                {
                    condition: "-15 dB",
                    displayName: "94.wav",
                    fileName: "94.wav"
                },
                {
                    condition: "-15 dB",
                    displayName: "116.wav",
                    fileName: "116.wav"
                }
            ]
        },

        {
            title: "NoiseX-92: -5 to 0 dB",
            basePath: "./demo/Noise92-5dB",
            rows: [
                {
                    condition: "Babble / SNR -1.0 dB",
                    displayName: "0116_clean_fileid_127...",
                    fileName: "0116_clean_fileid_127__babble__start636389__-5_0dB__snr-1.0__tl-21.wav"
                },
                {
                    condition: "Babble / SNR -1.0 dB",
                    displayName: "0131_clean_fileid_201...",
                    fileName: "0131_clean_fileid_201__babble__start3207637__-5_0dB__snr-1.0__tl-29.wav"
                },
                {
                    condition: "Machinegun / SNR -4.0 dB",
                    displayName: "0138_clean_fileid_143...",
                    fileName: "0138_clean_fileid_143__machinegun__start1733285__-5_0dB__snr-4.0__tl-26.wav"
                },
                {
                    condition: "Destroyerops / SNR -4.0 dB",
                    displayName: "0092_clean_fileid_274...",
                    fileName: "0092_clean_fileid_274__destroyerops__start318752__-5_0dB__snr-4.0__tl-31.wav"
                }
            ]
        },

        {
            title: "NoiseX-92: -10 to -5 dB",
            basePath: "./demo/Noise92-10dB",
            rows: [
                {
                    condition: "Babble / SNR -6.0 dB",
                    displayName: "0091_clean_fileid_81...",
                    fileName: "0091_clean_fileid_81__babble__start1308443__-10_-5dB__snr-6.0__tl-31.wav"
                },
                {
                    condition: "Destroyerengine / SNR -7.0 dB",
                    displayName: "0122_clean_fileid_175...",
                    fileName: "0122_clean_fileid_175__destroyerengine__start11222__-10_-5dB__snr-7.0__tl-19.wav"
                },
                {
                    condition: "Buccaneer1 / SNR -7.0 dB",
                    displayName: "0015_clean_fileid_283...",
                    fileName: "0015_clean_fileid_283__buccaneer1__start2763973__-10_-5dB__snr-7.0__tl-32.wav"
                },
                {
                    condition: "Machinegun / SNR -10.0 dB",
                    displayName: "0138_clean_fileid_143...",
                    fileName: "0138_clean_fileid_143__machinegun__start1733285__-10_-5dB__snr-10.0__tl-24.wav"
                }
            ]
        }
    ];

    function createAudioCell(basePath, folder, fileName) {
        const src = `${basePath}/${folder}/${fileName}`;

        return `
            <td>
                <audio controls preload="none" src="${src}">
                    Your browser does not support the audio element.
                </audio>
            </td>
        `;
    }

    function createTable(dataset) {
        const tableHead = `
            <h2>${dataset.title}</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="text-align: left;">Condition (SNR)</th>
                            ${modelColumns.map(model => `<th>${model.label}</th>`).join("")}
                        </tr>
                    </thead>
                    <tbody>
        `;

        const tableBody = dataset.rows.map(row => `
            <tr>
                <td class="condition-col">
                    ${row.condition}
                    <span class="file-name">${row.displayName}</span>
                </td>
                ${modelColumns.map(model => createAudioCell(dataset.basePath, model.folder, row.fileName)).join("")}
            </tr>
        `).join("");

        const tableFooter = `
                    </tbody>
                </table>
            </div>
        `;

        return tableHead + tableBody + tableFooter;
    }

    document.getElementById("demo-content").innerHTML = datasets.map(createTable).join("");
</script>

</body>
</html>
